server:
  port: 8081

spring:
  application:
    name: student-portal-middleware

# AUCA API configuration
auca:
  api:
    base-url: https://auca-ims.onrender.com
    api-key: ${AUCA_API_KEY}
    connect-timeout-seconds: 10
    read-timeout-seconds: 30

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.auca.studentportal: INFO
    org.springframework.security: WARN
    org.springframework.web.client: WARN